<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เกมเปรียบเทียบเศษส่วน</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700;800;900&display=swap');
*{box-sizing:border-box}
body{
  margin:0; min-height:100vh; overflow:hidden; font-family:'Noto Sans Thai',sans-serif;
  color:#172033;
  background:
    radial-gradient(circle at top left,#fef08a 0 13%,transparent 30%),
    radial-gradient(circle at bottom right,#f9a8d4 0 15%,transparent 34%),
    linear-gradient(135deg,#dbeafe,#fefce8,#fae8ff);
}
.screen{display:none; min-height:100vh; padding:16px; align-items:center; justify-content:center}
.active{display:flex}
.card{
  width:min(1050px,96vw); background:#ffffffef; border:5px solid #fff; border-radius:34px;
  padding:28px; text-align:center; box-shadow:0 24px 70px #7c3aed33; position:relative; overflow:hidden;
}
.badge{display:inline-block;background:#3b0764;color:#fff;padding:8px 18px;border-radius:999px;font-weight:900;box-shadow:0 7px 0 #1e0633}
h1{font-size:clamp(34px,7vw,78px);line-height:1.07;margin:18px 0 10px;font-weight:900}
.sub{font-size:clamp(18px,3vw,30px);font-weight:800;color:#7c3aed;margin:8px 0 20px}
input{
  width:min(520px,90%);padding:18px 22px;border-radius:24px;border:4px solid #7c3aed;
  font-size:24px;text-align:center;font-weight:900;outline:none;background:#fff;
}
button{font-family:inherit;border:none;cursor:pointer;border-radius:26px;font-weight:900;transition:.12s}
button:active{transform:translateY(4px) scale(.99)}
.mainBtn{
  margin-top:18px;padding:16px 40px;font-size:clamp(24px,4vw,38px);color:#fff;
  background:linear-gradient(180deg,#c084fc,#7c3aed);box-shadow:0 9px 0 #581c87;
}
.how{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0 22px}
.how div{background:#fff7db;border:3px dashed #f59e0b;border-radius:24px;padding:14px;font-size:clamp(16px,2.4vw,22px);font-weight:900}
.topbar{position:fixed;inset:10px 10px auto 10px;z-index:10;display:flex;gap:8px;align-items:center}
.pill{
  background:#fff;border:3px solid #3b0764;border-radius:999px;padding:8px 14px;
  font-size:clamp(15px,2.2vw,22px);font-weight:900;box-shadow:0 6px 0 #3b07642e;
}
.gameBox{width:min(1080px,96vw);margin-top:58px;text-align:center}
.questionCard{
  background:#ffffffef;border:5px solid #fff;border-radius:32px;padding:22px;
  box-shadow:0 22px 60px #7c3aed33;
}
.round{font-size:clamp(20px,3vw,32px);font-weight:900;color:#be123c}
.prompt{font-size:clamp(18px,2.7vw,28px);font-weight:900;color:#475569;margin:10px 0 14px}
.compareRow{
  display:grid; grid-template-columns:1fr 150px 1fr; gap:18px; align-items:center; margin:20px 0;
}
.fracBox{
  min-height:180px; border:5px solid #111827; border-radius:30px; background:#fff;
  display:flex; align-items:center; justify-content:center; box-shadow:0 10px 0 #111827;
}
.fraction{
  display:inline-flex; flex-direction:column; align-items:center; justify-content:center;
  font-weight:900; color:#111827; font-size:clamp(54px,8vw,92px); line-height:1;
}
.fraction .bar{width:1.25em;height:7px;background:#111827;border-radius:99px;margin:8px 0}
.signSlot{
  height:150px; border:6px dashed #7c3aed; border-radius:28px; background:#faf5ff;
  display:flex; align-items:center; justify-content:center; font-size:clamp(54px,8vw,92px);
  font-weight:900; color:#7c3aed; box-shadow:inset 0 0 18px #7c3aed22;
}
.signSlot.flash{animation:slotFlash .45s ease}
@keyframes slotFlash{0%,100%{transform:scale(1)}50%{transform:scale(1.08);background:#fef3c7;border-color:#f59e0b}}
.signOptions{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}
.signBtn{
  min-height:92px;font-size:clamp(44px,8vw,82px);color:#fff;border:5px solid #111827;box-shadow:0 9px 0 #111827;
  animation:swoop .45s ease both;
}
.signBtn:nth-child(1){background:#2563eb}.signBtn:nth-child(2){background:#f97316}.signBtn:nth-child(3){background:#16a34a}
@keyframes swoop{0%{opacity:0;transform:translateY(70px) rotate(-8deg) scale(.7)}60%{opacity:1;transform:translateY(-10px) rotate(5deg) scale(1.05)}100%{opacity:1;transform:translateY(0) rotate(0) scale(1)}}
.flySign{
  position:fixed; z-index:30; font-size:90px; font-weight:900; color:#7c3aed;
  pointer-events:none; animation:flyToSlot .42s ease forwards;
}
@keyframes flyToSlot{to{left:var(--tx); top:var(--ty); transform:translate(-50%,-50%) scale(.9)}}
.emojiPop{
  position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:25; pointer-events:none;
}
.emojiPop.show{display:flex; animation:emojiFade .9s ease both}
.emoji{font-size:min(32vw,210px); filter:drop-shadow(0 12px 0 #0003)}
@keyframes emojiFade{0%{opacity:0;transform:scale(.4) rotate(-8deg)}20%{opacity:1;transform:scale(1.1) rotate(4deg)}80%{opacity:1}100%{opacity:0;transform:scale(.9)}}
.explain{
  position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#3b0764;color:white;
  border-radius:24px;padding:12px 22px;font-size:clamp(18px,3vw,30px);font-weight:900;display:none;z-index:31;
}
.explain.show{display:block;animation:ex .95s ease both}
@keyframes ex{0%{opacity:0;transform:translate(-50%,30px)}20%,80%{opacity:1;transform:translate(-50%,0)}100%{opacity:0;transform:translate(-50%,15px)}}
.shake{animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-12px)}40%{transform:translateX(12px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
.resultScore{font-size:clamp(54px,10vw,105px);color:#7c3aed;font-weight:900;margin:4px 0}
.review{margin-top:14px;max-height:42vh;overflow:auto;background:#f8fafc;border:3px solid #e9d5ff;border-radius:22px;padding:12px;text-align:left}
.item{padding:10px;border-bottom:1px solid #e9d5ff;font-weight:800;font-size:18px}.item:last-child{border-bottom:0}
.smallBtn{font-size:21px;padding:12px 22px;margin:8px 5px 0;background:#3b0764;color:white;box-shadow:0 6px 0 #1e0633}
.float{position:absolute;font-size:46px;opacity:.22;animation:float 4s ease-in-out infinite}
@keyframes float{50%{transform:translateY(-18px) rotate(8deg)}}
@media(max-width:720px){
  .screen{padding:10px}.card{padding:22px 14px;border-radius:28px}.how{grid-template-columns:1fr}
  .topbar{gap:4px}.pill{padding:6px 8px}.gameBox{margin-top:54px;width:98vw}
  .questionCard{padding:14px;border-radius:26px}
  .compareRow{grid-template-columns:1fr 78px 1fr;gap:8px;margin:14px 0}
  .fracBox{min-height:126px;border-width:4px;border-radius:22px;box-shadow:0 7px 0 #111827}
  .fraction{font-size:44px}.fraction .bar{height:5px;margin:6px 0}
  .signSlot{height:105px;border-width:4px;border-radius:22px}
  .signOptions{gap:9px}.signBtn{min-height:72px;border-width:4px;box-shadow:0 7px 0 #111827}
}
</style>
</head>
<body>
<section id="start" class="screen active">
  <div class="card">
    <span class="float" style="left:7%;top:9%">3/4</span>
    <span class="float" style="right:8%;top:13%;animation-delay:.6s">&gt;</span>
    <span class="float" style="left:10%;bottom:9%;animation-delay:1s">2/5</span>
    <span class="float" style="right:12%;bottom:9%;animation-delay:1.5s">😄</span>
    <div class="badge">Kru Pai Classroom</div>
    <h1>เกมเปรียบเทียบเศษส่วน</h1>
    <p class="sub">กดเครื่องหมายให้เด้งเข้าไปในช่องกลาง ถ้าถูกยิ้ม ถ้าผิดหน้าแดง 🔥</p>
    <div class="how">
      <div>🔢 เปรียบเทียบซ้าย–ขวา</div>
      <div>👆 กด &lt; &gt; หรือ =</div>
      <div>🎧 มีเสียงตอบถูก/ผิด</div>
    </div>
    <input id="playerName" placeholder="พิมพ์ชื่อผู้เล่น" maxlength="30">
    <br><button class="mainBtn" onclick="startGame()">เริ่มเปรียบเทียบ 🚀</button>
  </div>
</section>

<section id="game" class="screen">
  <div class="topbar">
    <div class="pill" id="namePill">👤 -</div>
    <div class="pill" id="scorePill">คะแนน 0</div>
    <div class="pill" id="wrongPill">พลาด 0</div>
  </div>
  <div class="gameBox">
    <div class="questionCard" id="questionCard">
      <div class="round" id="roundText">ข้อ 1/20</div>
      <div class="prompt">เลือกเครื่องหมายที่ถูกต้อง</div>
      <div class="compareRow">
        <div class="fracBox"><div class="fraction" id="leftFrac"></div></div>
        <div class="signSlot" id="signSlot">?</div>
        <div class="fracBox"><div class="fraction" id="rightFrac"></div></div>
      </div>
      <div class="signOptions">
        <button class="signBtn" onclick="chooseSign('<', this)">&lt;</button>
        <button class="signBtn" onclick="chooseSign('=', this)">=</button>
        <button class="signBtn" onclick="chooseSign('>', this)">&gt;</button>
      </div>
    </div>
  </div>
</section>

<section id="result" class="screen">
  <div class="card">
    <div class="badge">สรุปผลเปรียบเทียบเศษส่วน</div>
    <h1 id="resultTitle">เก่งมาก!</h1>
    <div class="resultScore" id="finalScore">0/20</div>
    <p class="sub" id="resultText"></p>
    <button class="smallBtn" onclick="restart()">เล่นใหม่ 🔁</button>
    <button class="smallBtn" onclick="toggleReview()">ดูเฉลย 📘</button>
    <div class="review" id="reviewBox" style="display:none"></div>
  </div>
</section>

<div class="emojiPop" id="emojiPop"><div class="emoji" id="emoji">😄</div></div>
<div class="explain" id="explain"></div>

<script>
const questions=[
  {l:[1,2], r:[1,3]},
  {l:[2,5], r:[3,5]},
  {l:[3,4], r:[6,8]},
  {l:[4,7], r:[2,7]},
  {l:[5,6], r:[3,6]},
  {l:[2,3], r:[4,9]},
  {l:[3,8], r:[1,2]},
  {l:[5,10], r:[1,2]},
  {l:[7,12], r:[5,12]},
  {l:[4,9], r:[5,9]},
  {l:[3,5], r:[6,10]},
  {l:[8,11], r:[7,11]},
  {l:[2,6], r:[1,4]},
  {l:[5,8], r:[3,4]},
  {l:[9,10], r:[4,5]},
  {l:[1,6], r:[2,12]},
  {l:[7,9], r:[6,9]},
  {l:[4,6], r:[2,3]},
  {l:[3,10], r:[2,5]},
  {l:[11,12], r:[10,12]}
];
let idx=0, score=0, wrong=0, player="", locked=false, log=[];

function gcd(a,b){return b?gcd(b,a%b):a}
function val(f){return f[0]/f[1]}
function signFor(l,r){const a=l[0]*r[1], b=r[0]*l[1]; return a>b?">":a<b?"<":"="}
function fracText(f){return `${f[0]}/${f[1]}`}
function renderFrac(el,f){el.innerHTML=`<span>${f[0]}</span><span class="bar"></span><span>${f[1]}</span>`}
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active")}
function startGame(){
  player=document.getElementById("playerName").value.trim()||"นักเปรียบเทียบเศษส่วน";
  idx=0;score=0;wrong=0;locked=false;log=[];
  document.getElementById("namePill").textContent="👤 "+player;
  show("game"); render();
}
function render(){
  locked=false;
  const q=questions[idx];
  document.getElementById("roundText").textContent=`ข้อ ${idx+1}/20`;
  document.getElementById("scorePill").textContent=`คะแนน ${score}`;
  document.getElementById("wrongPill").textContent=`พลาด ${wrong}`;
  document.getElementById("signSlot").textContent="?";
  document.getElementById("signSlot").classList.remove("flash");
  renderFrac(document.getElementById("leftFrac"),q.l);
  renderFrac(document.getElementById("rightFrac"),q.r);
  document.querySelectorAll(".signBtn").forEach((b,i)=>{
    b.classList.remove("shake");
    b.style.animation="none"; void b.offsetWidth; b.style.animation="";
    b.style.animationDelay=(i*.08)+"s";
  });
}
function chooseSign(s, btn){
  if(locked)return;
  locked=true;
  const q=questions[idx], ans=signFor(q.l,q.r);
  animateSign(s, btn);
  setTimeout(()=>{
    const correct=s===ans;
    document.getElementById("signSlot").textContent=s;
    document.getElementById("signSlot").classList.add("flash");
    log.push({no:idx+1,left:fracText(q.l),right:fracText(q.r),chosen:s,answer:ans,correct});
    if(correct){
      score++; playCorrect(); popEmoji("😄"); showExplain("ถูกต้องจ้า! เก่งมาก ✨");
    }else{
      wrong++; btn.classList.add("shake"); playWrong(); popEmoji("😡"); showExplain(`คำตอบที่ถูกคือ ${ans}`);
    }
    document.getElementById("scorePill").textContent=`คะแนน ${score}`;
    document.getElementById("wrongPill").textContent=`พลาด ${wrong}`;
    setTimeout(()=>{idx++; if(idx>=questions.length)finish(); else render();},950);
  },430);
}
function animateSign(s, btn){
  const slot=document.getElementById("signSlot").getBoundingClientRect();
  const b=btn.getBoundingClientRect();
  const fly=document.createElement("div");
  fly.className="flySign"; fly.textContent=s;
  fly.style.left=(b.left+b.width/2)+"px"; fly.style.top=(b.top+b.height/2)+"px";
  fly.style.setProperty("--tx",(slot.left+slot.width/2)+"px");
  fly.style.setProperty("--ty",(slot.top+slot.height/2)+"px");
  document.body.appendChild(fly);
  setTimeout(()=>fly.remove(),460);
}
function popEmoji(e){
  const box=document.getElementById("emojiPop"), emoji=document.getElementById("emoji");
  emoji.textContent=e;
  box.classList.remove("show"); void box.offsetWidth; box.classList.add("show");
}
function showExplain(t){
  const ex=document.getElementById("explain");
  ex.textContent=t; ex.classList.remove("show"); void ex.offsetWidth; ex.classList.add("show");
}
function playCorrect(){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const now=ctx.currentTime;
  [523.25,659.25,783.99].forEach((freq,i)=>{
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.frequency.value=freq; o.type="sine";
    g.gain.setValueAtTime(.0001,now+i*.08);
    g.gain.exponentialRampToValueAtTime(.18,now+i*.08+.02);
    g.gain.exponentialRampToValueAtTime(.0001,now+i*.08+.14);
    o.connect(g); g.connect(ctx.destination); o.start(now+i*.08); o.stop(now+i*.08+.16);
  });
}
function playWrong(){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const now=ctx.currentTime;
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type="sawtooth"; o.frequency.setValueAtTime(180,now); o.frequency.exponentialRampToValueAtTime(70,now+.35);
  g.gain.setValueAtTime(.0001,now); g.gain.exponentialRampToValueAtTime(.22,now+.03); g.gain.exponentialRampToValueAtTime(.0001,now+.38);
  o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+.4);
}
function finish(){
  show("result");
  const p=Math.round(score/questions.length*100);
  document.getElementById("finalScore").textContent=`${score}/20`;
  let title="ทำได้ดีมาก!", text=`${player} ได้ ${p}%`;
  if(score>=18){title="เทพเปรียบเทียบเศษส่วน 🌟"; text+=" — แม่นมากจ้า";}
  else if(score>=16){title="ผ่านภารกิจแล้ว 🎉"; text+=" — เข้าใจการเปรียบเทียบดีมาก";}
  else if(score>=12){title="ใกล้แล้วจ้า 💪"; text+=" — ทบทวนการทำตัวส่วนเท่ากันอีกนิด";}
  else{title="ลองใหม่ได้จ้า 🍀"; text+=" — ฝึกดูตัวเศษ/ตัวส่วนและการคูณไขว้เพิ่มเติม";}
  document.getElementById("resultTitle").textContent=title;
  document.getElementById("resultText").textContent=text;
  buildReview();
}
function buildReview(){
  const box=document.getElementById("reviewBox");
  box.innerHTML=log.map(r=>`<div class="item"><b>ข้อ ${r.no}</b> ${r.correct?"✅":"❌"} ${r.left} ${r.chosen} ${r.right}<br>เฉลย: <b>${r.left} ${r.answer} ${r.right}</b></div>`).join("");
  box.style.display="none";
}
function toggleReview(){const b=document.getElementById("reviewBox"); b.style.display=b.style.display==="none"?"block":"none"}
function restart(){show("start")}
</script>
</body>
</html>
